events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name researchmate.site www.researchmate.site api.researchmate.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Frontend — HTTPS
    server {
        listen 443 ssl;
        server_name researchmate.site www.researchmate.site;

        ssl_certificate /etc/letsencrypt/live/researchmate.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/researchmate.site/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # API — HTTPS
    server {
        listen 443 ssl;
        server_name api.researchmate.site;

        ssl_certificate /etc/letsencrypt/live/researchmate.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/researchmate.site/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 50M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
